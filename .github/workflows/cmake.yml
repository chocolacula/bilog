name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        uses: conan-io/setup-conan@v1

      - name: Unittest
        run: |
          conan install . -s build_type=Debug --build=missing
          cmake --preset Debug
          cmake --build --preset Debug
          ctest --preset Debug --output-on-failure
