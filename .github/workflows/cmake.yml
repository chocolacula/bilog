name: CTest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: >
          conan install .
          cmake --preset Debug -j 2
          cmake --build --preset Debug -j 2
          ctest --preset Debug --output-on-failure
